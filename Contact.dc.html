<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./js/support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="uploads/web_logo.png">
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/site.js"></script>
  <template id="__bundler_thumbnail"><svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><rect width="64" height="64" rx="14" fill="#0f1f4a"/><text x="32" y="41" font-family="Arial" font-size="24" font-weight="800" fill="#fff" text-anchor="middle">FI</text></svg></template>
</helmet>
<div class="fi-page fi-page--soft">
  <dc-import name="Nav" current="contact" hint-size="100%,66px"></dc-import>

  <section class="fi-section fi-section--hero">
    <div class="fi-container fi-container--narrow fi-pad-hero">
      <div class="fi-eyebrow">{{ eyebrow }}</div>
      <h1 class="fi-title">{{ title }}</h1>
      <p class="fi-lead" style="max-width:560px">{{ lead }}</p>
    </div>
  </section>

  <section>
    <div class="fi-container fi-container--narrow fi-split" style="padding-top:clamp(40px,6vw,72px);padding-bottom:clamp(40px,6vw,72px);gap:clamp(28px,4vw,48px);align-items:flex-start">
      <!-- methods -->
      <div class="fi-stack" style="flex:1 1 280px;min-width:260px;gap:14px">
        <a href="{{ mailto }}" class="fi-contact-link">
          <span class="fi-icon-tile" style="background:#e8eefc;color:#1e3a8a"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"></rect><path d="m3 7 9 6 9-6"></path></svg></span>
          <span class="fi-contact-link__body"><span class="fi-contact-link__label">{{ emailLabel }}</span><span class="fi-contact-link__value">{{ email }}</span></span>
        </a>
        <div class="fi-card" style="border-radius:16px;padding:22px">
          <div style="font-size:13px;font-weight:700;color:#94a3b8;letter-spacing:.04em;margin-bottom:14px">{{ topicsLabel }}</div>
          <div style="display:flex;flex-direction:column;gap:11px">
            <sc-for list="{{ topics }}" as="tp" hint-placeholder-count="3">
              <div style="display:flex;gap:10px;align-items:flex-start;font-size:14px;color:#475569;line-height:1.45"><span style="color:#1e3a8a;font-weight:800">·</span>{{ tp }}</div>
            </sc-for>
          </div>
        </div>
      </div>

      <!-- form -->
      <div class="fi-card" style="flex:1.3 1 360px;min-width:300px;border-radius:20px;padding:clamp(26px,4vw,38px)">
        <h2 style="font-size:22px;font-weight:800;letter-spacing:-.01em;margin:0 0 6px">{{ formTitle }}</h2>
        <p style="font-size:14px;color:#697386;margin:0 0 24px;line-height:1.5">{{ formNote }}</p>
        <div style="display:flex;flex-direction:column;gap:16px">
          <div style="display:flex;gap:14px;flex-wrap:wrap">
            <label style="flex:1 1 150px;min-width:140px"><span style="{{ lbl }}">{{ fName }}</span><input class="fi-inp" type="text" value="{{ vName }}" onInput="{{ onName }}" placeholder="{{ phName }}"></label>
            <label style="flex:1 1 150px;min-width:140px"><span style="{{ lbl }}">{{ fEmail }}</span><input class="fi-inp" type="email" value="{{ vEmail }}" onInput="{{ onEmail }}" placeholder="{{ phEmail }}"></label>
          </div>
          <label><span style="{{ lbl }}">{{ fTopic }}</span>
            <select class="fi-inp" value="{{ vTopic }}" onChange="{{ onTopic }}">
              <sc-for list="{{ topicOptions }}" as="op" hint-placeholder-count="4">
                <option value="{{ op }}">{{ op }}</option>
              </sc-for>
            </select>
          </label>
          <label><span style="{{ lbl }}">{{ fMsg }}</span><textarea class="fi-inp" value="{{ vMsg }}" onInput="{{ onMsg }}" placeholder="{{ phMsg }}"></textarea></label>
          <button onClick="{{ submit }}" class="fi-button fi-button--primary" style="margin-top:4px;border:none;padding:15px 22px" style-hover="transform:translateY(-2px);box-shadow:0 16px 30px -10px rgba(30,58,138,.8)">{{ submitLabel }}</button>
          <div style="font-size:12.5px;color:#9aa6b8;text-align:center;line-height:1.5">{{ mailHint }}</div>
        </div>
      </div>
    </div>
  </section>

  <dc-import name="Footer" hint-size="100%,340px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:820}}">
class Component extends DCLogic {
  constructor(props){
    super(props);
    this.state = {
      lang: (window.FI && window.FI.getLang && window.FI.getLang()) || 'ko',
      name: '', email: '', topic: '', msg: ''
    };
  }
  componentDidMount(){
    if (window.FI && window.FI.bindLang) this._off = window.FI.bindLang(this);
    try { document.title = '문의 · Financial-Independence'; } catch(e){}
  }
  componentWillUnmount(){ if (this._off) this._off(); }
  renderVals(){
    var self = this;
    var ko = this.state.lang === 'ko';
    var t = function(a,b){ return ko ? a : b; };
    var C = (window.FI && window.FI.COMPANY) || {};
    var email = C.email || '';
    var topicOptions = ko
      ? ['외주 · 개발 요청','서비스 이용 문의','제휴 · 광고','미디어 · 취재','기타']
      : ['Freelance · Dev request','Using a product','Partnership · Ads','Media · Press','Other'];
    var lbl = { display:'block', fontSize:'13px', fontWeight:700, color:'#475569', marginBottom:'7px' };

    var submit = function(){
      var s = self.state;
      var topic = s.topic || topicOptions[0];
      var subj = '[Financial-Independence] ' + topic + (s.name ? ' - ' + s.name : '');
      var bodyLines = [
        (ko?'이름: ':'Name: ') + (s.name||''),
        (ko?'회신 이메일: ':'Reply email: ') + (s.email||''),
        (ko?'문의 유형: ':'Topic: ') + topic,
        '',
        (s.msg||'')
      ];
      var href = 'mailto:' + email + '?subject=' + encodeURIComponent(subj) + '&body=' + encodeURIComponent(bodyLines.join('\n'));
      try { window.location.href = href; } catch(e){}
    };

    return {
      eyebrow: t('문의','Contact'),
      title: t('무엇이든 편하게 연락 주세요','Reach out about anything'),
      lead: t('외주·개발 요청, 서비스 이용, 제휴·광고, 미디어 취재 등 어떤 문의든 환영합니다. 보통 영업일 기준 며칠 안에 답장드립니다.','App and web development requests, product questions, partnerships, ads and press are all welcome. We usually reply within a few business days.'),
      mailto: 'mailto:' + email,
      email: email,
      emailLabel: t('이메일','Email'),
      topicsLabel: t('이런 문의를 받습니다','What we hear about'),
      topics: ko
        ? ['앱·웹 외주 개발 및 제작 요청 (기획·디자인·개발·배포)','서비스 사용 중 생긴 문의와 피드백','광고·제휴 등 비즈니스 제안','앱·서비스 관련 미디어 취재 요청']
        : ['App / web development & build requests (plan · design · dev · deploy)','Questions and feedback while using a product','Business, ads and partnership proposals','Media and press inquiries about our apps'],
      formTitle: t('메시지 보내기','Send a message'),
      formNote: t('아래를 작성하면 메일 앱이 열리며 내용이 자동으로 채워집니다.','Fill this in and your mail app opens with everything prefilled.'),
      lbl: lbl,
      fName: t('이름','Name'), phName: t('홍길동','Your name'), vName: this.state.name, onName: function(e){ self.setState({ name: e.target.value }); },
      fEmail: t('회신 이메일','Your email'), phEmail: 'you@example.com', vEmail: this.state.email, onEmail: function(e){ self.setState({ email: e.target.value }); },
      fTopic: t('문의 유형','Topic'), vTopic: this.state.topic || topicOptions[0], topicOptions: topicOptions, onTopic: function(e){ self.setState({ topic: e.target.value }); },
      fMsg: t('내용','Message'), phMsg: t('어떤 점이 궁금하신가요?','How can we help?'), vMsg: this.state.msg, onMsg: function(e){ self.setState({ msg: e.target.value }); },
      submit: submit,
      submitLabel: t('메일로 보내기','Send via email'),
      mailHint: t('· 전송 시 기본 메일 앱이 열립니다','· opens your default mail app')
    };
  }
}
</script>
</body>
</html>
