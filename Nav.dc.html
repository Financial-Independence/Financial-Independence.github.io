<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./js/support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/site.js"></script>
</helmet>
<header class="fi-nav">
  <nav class="fi-nav__inner">
    <a href="Home.dc.html" class="fi-nav__brand">
      <span class="fi-nav__mark">FI</span>
      <span class="fi-nav__brand-text">
        <span class="fi-nav__brand-name">Financial-Independence</span>
        <span class="fi-nav__brand-sub">{{ studioLabel }}</span>
      </span>
    </a>
    <div class="fi-nav__actions">
      <div class="fi-nav__links">
        <a href="Home.dc.html" class="{{ sHome }}">{{ navHome }}</a>
        <a href="Projects.dc.html" class="{{ sProjects }}">{{ navProjects }}</a>
        <a href="About.dc.html" class="{{ sAbout }}">{{ navAbout }}</a>
        <a href="Contact.dc.html" class="{{ sContact }}">{{ navContact }}</a>
      </div>
      <div class="fi-nav__lang">
        <button onClick="{{ setKo }}" class="{{ koSeg }}">KO</button>
        <button onClick="{{ setEn }}" class="{{ enSeg }}">EN</button>
      </div>
      <a href="Projects.dc.html" class="fi-button fi-button--primary fi-nav__cta">{{ ctaLabel }}</a>
    </div>
  </nav>
</header>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1200,&quot;height&quot;:80},&quot;current&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;string&quot;,&quot;default&quot;:&quot;home&quot;}}">
class Component extends DCLogic {
  constructor(props){
    super(props);
    var l = (window.FI && window.FI.getLang && window.FI.getLang()) || 'ko';
    this.state = { lang: l };
  }
  componentDidMount(){
    if (window.FI && window.FI.bindLang) this._off = window.FI.bindLang(this);
  }
  componentWillUnmount(){ if (this._off) this._off(); }
  renderVals(){
    var ko = this.state.lang === 'ko';
    var cur = this.props.current || '';
    var t = function(a,b){ return ko ? a : b; };
    var mk = function(id){ return 'fi-nav__link' + (cur === id ? ' fi-nav__link--active' : ''); };
    var seg = function(on){ return 'fi-nav__lang-button' + (on ? ' fi-nav__lang-button--active' : ''); };
    return {
      studioLabel: t('인디 개발 스튜디오', 'Indie dev studio'),
      navHome: t('홈','Home'),
      navProjects: t('프로젝트','Projects'),
      navAbout: t('소개','About'),
      navContact: t('문의','Contact'),
      ctaLabel: t('프로젝트 구경','Explore projects'),
      sHome: mk('home'), sProjects: mk('projects'), sAbout: mk('about'), sContact: mk('contact'),
      koSeg: seg(ko),
      enSeg: seg(!ko),
      setKo: function(){ if (window.FI) window.FI.setLang('ko'); },
      setEn: function(){ if (window.FI) window.FI.setLang('en'); }
    };
  }
}
</script>
</body>
</html>
