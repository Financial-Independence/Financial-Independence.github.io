<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="site.js"></script>
</helmet>
<header style="position:sticky;top:0;z-index:50;background:rgba(255,255,255,.82);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid #e8edf5;font-family:'Pretendard',-apple-system,sans-serif">
  <nav style="max-width:1200px;margin:0 auto;padding:13px clamp(16px,4vw,40px);display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap">
    <a href="Home.dc.html" style="display:flex;align-items:center;gap:11px;text-decoration:none;flex:none">
      <span style="width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#1e3a8a,#0f1f4a);color:#fff;display:grid;place-items:center;font-weight:800;font-size:16px;letter-spacing:-.02em;box-shadow:0 4px 12px -4px rgba(15,31,74,.5)">FI</span>
      <span style="display:flex;flex-direction:column;line-height:1.1;gap:1px">
        <span style="font-size:15px;font-weight:800;color:#0f172a;letter-spacing:-.01em;white-space:nowrap">Financial-Independence</span>
        <span style="font-size:11px;font-weight:600;color:#8a93a6;letter-spacing:.02em">{{ studioLabel }}</span>
      </span>
    </a>
    <div style="display:flex;align-items:center;gap:clamp(14px,2.5vw,30px);flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:clamp(14px,2.2vw,28px)">
        <a href="Home.dc.html" style="{{ sHome }}" style-hover="{{ sHover }}">{{ navHome }}</a>
        <a href="Projects.dc.html" style="{{ sProjects }}" style-hover="{{ sHover }}">{{ navProjects }}</a>
        <a href="About.dc.html" style="{{ sAbout }}" style-hover="{{ sHover }}">{{ navAbout }}</a>
        <a href="Contact.dc.html" style="{{ sContact }}" style-hover="{{ sHover }}">{{ navContact }}</a>
      </div>
      <div style="display:flex;align-items:center;border:1px solid #d8dfea;border-radius:999px;overflow:hidden;height:32px">
        <button onClick="{{ setKo }}" style="{{ koSeg }}">KO</button>
        <button onClick="{{ setEn }}" style="{{ enSeg }}">EN</button>
      </div>
      <a href="Projects.dc.html" style="text-decoration:none;background:#1e3a8a;color:#fff;font-size:14px;font-weight:700;padding:9px 17px;border-radius:999px;white-space:nowrap;box-shadow:0 6px 16px -8px rgba(30,58,138,.7);transition:transform .15s,box-shadow .15s" style-hover="transform:translateY(-1px);box-shadow:0 10px 22px -8px rgba(30,58,138,.8)">{{ ctaLabel }}</a>
    </div>
  </nav>
</header>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1200,&quot;height&quot;:80},&quot;current&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;string&quot;,&quot;default&quot;:&quot;home&quot;}}">
class Component extends DCLogic {
  constructor(props){
    super(props);
    var l = (window.FI && window.FI.getLang && window.FI.getLang()) || 'ko';
    this.state = { lang: l };
  }
  componentDidMount(){
    if (window.FI) {
      this.setState({ lang: window.FI.getLang() });
      this._off = window.FI.onLangChange((l) => this.setState({ lang: l }));
    }
  }
  componentWillUnmount(){ if (this._off) this._off(); }
  renderVals(){
    var ko = this.state.lang === 'ko';
    var cur = this.props.current || '';
    var t = function(a,b){ return ko ? a : b; };
    var base = { textDecoration:'none', fontSize:'15px', fontWeight:600, color:'#5a6478', whiteSpace:'nowrap', transition:'color .15s', paddingBottom:'2px' };
    var active = Object.assign({}, base, { color:'#1e3a8a', fontWeight:700, borderBottom:'2px solid #1e3a8a' });
    var seg = { border:'none', cursor:'pointer', fontFamily:'JetBrains Mono,monospace', fontSize:'12px', fontWeight:700, padding:'0 11px', height:'100%', letterSpacing:'.04em' };
    var segOn = Object.assign({}, seg, { background:'#1e3a8a', color:'#fff' });
    var segOff = Object.assign({}, seg, { background:'transparent', color:'#8a93a6' });
    var mk = function(id){ return cur === id ? active : base; };
    return {
      studioLabel: t('인디 개발 스튜디오', 'Indie dev studio'),
      navHome: t('홈','Home'),
      navProjects: t('프로젝트','Projects'),
      navAbout: t('소개','About'),
      navContact: t('문의','Contact'),
      ctaLabel: t('프로젝트 구경','Explore projects'),
      sHome: mk('home'), sProjects: mk('projects'), sAbout: mk('about'), sContact: mk('contact'),
      sHover: { color:'#1e3a8a' },
      koSeg: ko ? segOn : segOff,
      enSeg: ko ? segOff : segOn,
      setKo: function(){ if (window.FI) window.FI.setLang('ko'); },
      setEn: function(){ if (window.FI) window.FI.setLang('en'); }
    };
  }
}
</script>
</body>
</html>
