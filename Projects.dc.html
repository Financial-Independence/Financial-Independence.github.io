<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./js/support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/site.js"></script>
  <template id="__bundler_thumbnail"><svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><rect width="64" height="64" rx="14" fill="#0f1f4a"/><text x="32" y="41" font-family="Arial" font-size="24" font-weight="800" fill="#fff" text-anchor="middle">FI</text></svg></template>
</helmet>
<div class="fi-page fi-page--soft">
  <dc-import name="Nav" current="projects" hint-size="100%,66px"></dc-import>

  <section class="fi-section fi-section--hero">
    <div class="fi-container fi-pad-hero">
      <div class="fi-eyebrow">{{ eyebrow }}</div>
      <h1 class="fi-title">{{ title }}</h1>
      <p class="fi-lead" style="max-width:620px">{{ lead }}</p>
      <p style="max-width:620px;margin:10px 0 0;color:#94a3b8;font-size:13.5px;line-height:1.55">{{ leadNote }}</p>
    </div>
  </section>

  <section>
    <div class="fi-container fi-container--body fi-stack" style="gap:28px">
      <sc-for list="{{ cards }}" as="c" hint-placeholder-count="2">
        <div class="fi-card" style="border-radius:24px;overflow:hidden;height:clamp(360px,28vw,400px)">
          <div style="display:flex;flex-wrap:wrap;align-items:stretch;height:100%">
            <div style="flex:1 1 340px;min-width:280px;background:{{ c.mediaBg }};display:flex;align-items:center;justify-content:center;padding:clamp(26px,3.5vw,40px);height:100%">
              <sc-if value="{{ c.isWeb }}" hint-placeholder-val="{{ false }}">
                <div class="fi-browser-frame fi-browser-frame--card" style="width:100%;max-width:440px">
                  <div class="fi-browser-bar"><span class="fi-browser-dot fi-browser-dot--red"></span><span class="fi-browser-dot fi-browser-dot--yellow"></span><span class="fi-browser-dot fi-browser-dot--green"></span></div>
                  <div class="fi-browser-frame__viewport">
                    {{ c.heroEl }}
                  </div>
                </div>
              </sc-if>
              <sc-if value="{{ c.isPhone }}" hint-placeholder-val="{{ false }}">
                <div class="fi-phone-frame" style="width:clamp(128px,36%,170px);max-height:100%">
                  {{ c.heroEl }}
                </div>
              </sc-if>
              <sc-if value="{{ c.noHero }}" hint-placeholder-val="{{ false }}">
                <div style="text-align:center;color:#fff">
                  <div style="width:84px;height:84px;border-radius:22px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);display:grid;place-items:center;font-size:30px;font-weight:800;margin:0 auto 18px">{{ c.mark }}</div>
                  <div style="font-size:18px;font-weight:700;opacity:.92">{{ c.name }}</div>
                  <div style="font-size:13px;margin-top:6px;opacity:.7;font-family:'JetBrains Mono',monospace">{{ c.platformsLine }}</div>
                </div>
              </sc-if>
            </div>
            <div style="flex:1.15 1 380px;min-width:300px;padding:clamp(28px,3.5vw,44px)">
              <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">
                <span style="font-size:13px;font-weight:700;color:{{ c.accent }};letter-spacing:.02em;white-space:nowrap">{{ c.category }}</span>
                <span class="{{ c.badgeClass }}">{{ c.badge }}</span>
              </div>
              <h2 style="font-size:clamp(26px,3vw,34px);font-weight:800;letter-spacing:-.02em;margin:0;line-height:1.1">{{ c.name }}</h2>
              <p style="font-size:18px;font-weight:600;color:#334155;margin:12px 0 0;line-height:1.4">{{ c.tagline }}</p>
              <p style="font-size:15px;line-height:1.65;color:#64748b;margin:14px 0 0;max-width:520px">{{ c.summary }}</p>
              <div style="display:flex;flex-wrap:wrap;gap:7px;margin-top:22px">
                <sc-for list="{{ c.tech }}" as="tg" hint-placeholder-count="5">
                  <span class="fi-tag">{{ tg }}</span>
                </sc-for>
              </div>
              <div style="display:flex;flex-wrap:wrap;gap:12px;margin-top:28px">
                <a href="{{ c.href }}" class="fi-button fi-button--primary" style="background:{{ c.accent }};font-size:15px;padding:12px 22px" style-hover="transform:translateY(-2px);filter:brightness(1.08)">{{ c.cta }} →</a>
                <sc-if value="{{ c.hasUrl }}" hint-placeholder-val="{{ true }}">
                  <a href="{{ c.url }}" target="_blank" rel="noopener" class="fi-button fi-button--outline" style="font-size:15px;padding:12px 20px" style-hover="background:#f6f8fc">{{ c.openLabel }} ↗</a>
                </sc-if>
              </div>
            </div>
          </div>
        </div>
      </sc-for>

      <div style="border:2px dashed #d4dbe8;border-radius:24px;padding:clamp(36px,5vw,56px);text-align:center;background:#fafbfe">
        <div style="width:54px;height:54px;border-radius:14px;background:#eef2f9;color:#94a3b8;display:grid;place-items:center;font-size:28px;font-weight:300;margin:0 auto 18px">+</div>
        <h3 style="font-size:22px;font-weight:800;color:#475569;margin:0 0 10px;letter-spacing:-.01em">{{ soonTitle }}</h3>
        <p style="font-size:15px;line-height:1.6;color:#94a3b8;margin:0 auto;max-width:460px">{{ soonDesc }}</p>
      </div>
    </div>
  </section>

  <dc-import name="Footer" hint-size="100%,340px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900}}">
class Component extends DCLogic {
  constructor(props){
    super(props);
    this.state = { lang: (window.FI && window.FI.getLang && window.FI.getLang()) || 'ko' };
  }
  componentDidMount(){
    if (window.FI && window.FI.bindLang) this._off = window.FI.bindLang(this);
    try { document.title = '프로젝트 · Financial-Independence'; } catch(e){}
  }
  componentWillUnmount(){ if (this._off) this._off(); }
  renderVals(){
    var ko = this.state.lang === 'ko';
    var t = function(a,b){ return ko ? a : b; };
    var P = (window.FI && window.FI.PROJECTS) || [];
    var cards = P.map(function(p){
      return {
        href: 'Project.dc.html?id=' + p.id,
        accent: p.accent,
        mediaBg: 'linear-gradient(150deg,' + p.accent + ',' + p.accentDeep + ')',
        isWeb: !!p.hero && p.heroKind === 'web',
        isPhone: !!p.hero && p.heroKind === 'phone',
        noHero: !p.hero,
        heroEl: (p.hero ? React.createElement('img', { src: p.hero, alt: '',
          style: p.heroKind === 'phone'
            ? { display:'block', width:'100%', height:'auto' }
            : { display:'block', width:'100%' } }) : null),
        mark: p.mark,
        platformsLine: p.platforms.join('  ·  '),
        category: ko ? p.category.ko : p.category.en,
        badge: p.released ? t('운영 중','Live') : t('개발 중','In dev'),
        badgeClass: 'fi-pill ' + (p.released ? 'fi-pill--live' : 'fi-pill--pending'),
        name: ko ? p.name.ko : p.name.en,
        tagline: ko ? p.tagline.ko : p.tagline.en,
        summary: ko ? p.summary.ko : p.summary.en,
        tech: p.tech,
        cta: t('자세히 보기','View project'),
        hasUrl: !!p.url,
        url: p.url || '#',
        openLabel: t('웹에서 열기','Open web app')
      };
    });
    return {
      eyebrow: t('프로젝트','Projects'),
      title: t('우리가 만든 서비스','Products we build'),
      lead: t('직접 기획하고 개발한 서비스를 통해 실제 사용자 환경에서 제품의 가능성을 확인합니다.','We validate product potential in real user environments through services we plan and build ourselves.'),
      leadNote: t('새 프로젝트가 완성되면 이 목록에 계속 추가됩니다.','New projects are added to this list as they are completed.'),
      cards: cards,
      soonTitle: t('더 많은 프로젝트가 개발 중','More projects in development'),
      soonDesc: t('다음 서비스를 준비하고 있습니다. 출시되는 대로 이곳에서 소개할게요.','We\u2019re working on what\u2019s next, and it will appear here the moment it ships.')
    };
  }
}
</script>
</body>
</html>
