<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./js/support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/site.js"></script>
</helmet>
<footer class="fi-footer">
  <div class="fi-footer__main">
    <div style="min-width:200px">
      <div class="fi-footer__brand">
        <span class="fi-footer__mark">FI</span>
        <span class="fi-footer__name">Financial-Independence</span>
      </div>
      <p class="fi-footer__blurb">{{ blurb }}</p>
    </div>
    <div>
      <div class="fi-footer-heading">{{ hExplore }}</div>
      <a href="Home.dc.html" class="fi-footer-link">{{ navHome }}</a>
      <a href="Projects.dc.html" class="fi-footer-link">{{ navProjects }}</a>
      <a href="About.dc.html" class="fi-footer-link">{{ navAbout }}</a>
      <a href="Contact.dc.html" class="fi-footer-link">{{ navContact }}</a>
    </div>
    <div>
      <div class="fi-footer-heading">{{ hProjects }}</div>
      <a href="Project.dc.html?id=dividend-analysis" class="fi-footer-link">{{ p0 }}</a>
      <a href="Project.dc.html?id=deposit-guard" class="fi-footer-link">{{ p1 }}</a>
      <span style="display:block;font-size:13px;color:#5f73a0;margin-top:6px">{{ moreSoon }}</span>
    </div>
    <div>
      <div class="fi-footer-heading">{{ hContact }}</div>
      <a href="{{ mailto }}" class="fi-footer-link">{{ email }}</a>
      <a href="Contact.dc.html" class="fi-footer-link">{{ contactPage }}</a>
    </div>
  </div>
  <div class="fi-footer__bottom">
    <div class="fi-footer__bottom-inner">
      <span class="fi-footer__copyright">© {{ year }} Financial-Independence · {{ nameKo }}</span>
      <span class="fi-footer__rights">{{ rights }}</span>
    </div>
  </div>
</footer>
<button type="button" class="{{ topClass }}" onClick="{{ scrollTop }}" aria-label="{{ topLabel }}" title="{{ topLabel }}">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="m18 15-6-6-6 6"></path>
  </svg>
</button>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1200,&quot;height&quot;:340}}">
class Component extends DCLogic {
  constructor(props){
    super(props);
    this.state = {
      lang: (window.FI && window.FI.getLang && window.FI.getLang()) || 'ko',
      showTop: false
    };
  }
  componentDidMount(){
    if (window.FI && window.FI.bindLang) this._off = window.FI.bindLang(this);
    var self = this;
    this._onScroll = function(){ self._syncTop(); };
    window.addEventListener('scroll', this._onScroll, { passive: true });
    this._syncTop();
  }
  componentWillUnmount(){
    if (this._off) this._off();
    if (this._onScroll) window.removeEventListener('scroll', this._onScroll);
  }
  _syncTop(){
    var y = 0;
    try { y = window.pageYOffset || document.documentElement.scrollTop || document.body.scrollTop || 0; } catch(e){}
    var next = y > 220;
    if (this.state.showTop !== next) this.setState({ showTop: next });
  }
  renderVals(){
    var ko = this.state.lang === 'ko';
    var t = function(a,b){ return ko ? a : b; };
    var C = (window.FI && window.FI.COMPANY) || {};
    var P = (window.FI && window.FI.PROJECTS) || [];
    var nm = function(p, i){ return p[i] ? (ko ? p[i].name.ko : p[i].name.en) : ''; };
    return {
      blurb: ko ? (C.blurb ? C.blurb.ko : '') : (C.blurb ? C.blurb.en : ''),
      email: C.email || '',
      mailto: 'mailto:' + (C.email || ''),
      year: C.year || 2026,
      nameKo: C.nameKo || '',
      hExplore: t('둘러보기','Explore'),
      hProjects: t('프로젝트','Projects'),
      hContact: t('문의','Contact'),
      navHome: t('홈','Home'),
      navProjects: t('프로젝트','Projects'),
      navAbout: t('회사 소개','About'),
      navContact: t('문의하기','Contact'),
      p0: nm(P,0), p1: nm(P,1),
      moreSoon: t('+ 곧 추가됩니다','+ more coming'),
      contactPage: t('문의 페이지','Contact page'),
      rights: t('All rights reserved.','All rights reserved.'),
      topLabel: t('맨 위로', 'Back to top'),
      topClass: 'fi-scroll-top' + (this.state.showTop ? ' fi-scroll-top--visible' : ''),
      scrollTop: function(){
        try { window.scrollTo({ top: 0, behavior: 'smooth' }); }
        catch(e){ try { window.scrollTo(0, 0); } catch(_){} }
      }
    };
  }
}
</script>
</body>
</html>
